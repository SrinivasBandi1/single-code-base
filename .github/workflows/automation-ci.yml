name: Automation CI Pipeline 

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to test'
        required: true
        default: 'ida'
        type: choice
        options:
          - ida
          - nas
      environment:
        description: 'Environment to test against'
        required: true
        default: 'pathqa'
        type: choice
        options:
          - dev
          - pathqa
          - staging
          - demo
      browser:
        description: 'Browser'
        required: false
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    # ── Resolve inputs ────────────────────────────────────────────────────────
    # workflow_dispatch inputs are empty on push triggers, so we fall back
    # to safe defaults so the push-triggered run still works.
    env:
      PROJECT:  ${{ github.event.inputs.project     || 'ida' }}
      ENV_NAME: ${{ github.event.inputs.environment || 'pathqa' }}
      BROWSER:  ${{ github.event.inputs.browser     || 'chrome' }}

    steps:

      # STEP 1: Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # STEP 2: Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: '17'

      # STEP 3: Cache Maven
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}
   
################################################################################
# Selenium Automation Execution
################################################################################

      # STEP 4: Run Maven tests
      # -Dproject / -Denv / -Dbrowser are picked up by ConfigManager
      # -Dheadless=true is always forced on CI (no display available)
      - name: Run Maven tests
        run: |
          echo "Running suite → project: $PROJECT | env: $ENV_NAME | browser: $BROWSER"
          mvn clean test \
            -Dproject=$PROJECT \
            -Denv=$ENV_NAME \
            -Dbrowser=$BROWSER \
            -Dheadless=true
        continue-on-error: true

################################################################################
# Allure Report Generation
################################################################################

      # STEP 5: Verify results folder
      - name: Check allure results
        run: |
          if [ -d target/allure-results ]; then
            echo "Allure results found"
            ls -la target/allure-results
          else
            echo "Creating empty allure-results"
            mkdir -p target/allure-results
          fi

      # STEP 6: Install Allure CLI
      - name: Install Allure CLI
        run: |
          curl -Ls -o allure.tgz https://github.com/allure-framework/allure2/releases/download/2.24.1/allure-2.24.1.tgz
          sudo tar -zxvf allure.tgz -C /opt/
          sudo ln -sf /opt/allure-2.24.1/bin/allure /usr/bin/allure
          allure --version

      # STEP 7: Generate Allure report
      # Report title includes project + env so you know which run you're looking at
      - name: Generate Allure report
        run: |
          mkdir -p allure-report
          allure generate target/allure-results --clean -o allure-report \
            --report-name "IDA/NAS Regression — $PROJECT / $ENV_NAME" || true

          if [ ! -f allure-report/index.html ]; then
            echo "Creating fallback report"
            echo "<html><body><h2>No Allure results found for $PROJECT / $ENV_NAME</h2></body></html>" \
              > allure-report/index.html
          fi

################################################################################
# Publish Report to GitHub Pages
################################################################################

      # STEP 8: Upload Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      # STEP 9: Deploy Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

################################################################################
# Workflow Summary
################################################################################

      # STEP 9.5: Add report link + run context to summary
      - name: Add Allure report link to summary
        if: always()
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          echo "## 🚀 Automation Execution Completed"               >> $GITHUB_STEP_SUMMARY
          echo ""                                                    >> $GITHUB_STEP_SUMMARY
          echo "| Key         | Value          |"                   >> $GITHUB_STEP_SUMMARY
          echo "|-------------|----------------|"                   >> $GITHUB_STEP_SUMMARY
          echo "| **Project** | \`$PROJECT\`   |"                  >> $GITHUB_STEP_SUMMARY
          echo "| **Env**     | \`$ENV_NAME\`  |"                  >> $GITHUB_STEP_SUMMARY
          echo "| **Browser** | \`$BROWSER\`   |"                  >> $GITHUB_STEP_SUMMARY
          echo ""                                                    >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Test Report"                                 >> $GITHUB_STEP_SUMMARY
          echo ""                                                    >> $GITHUB_STEP_SUMMARY
          echo "🔗 [Open Allure Report]($PAGE_URL)"                 >> $GITHUB_STEP_SUMMARY
          echo ""                                                    >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

################################################################################
# Email Notification
################################################################################

      # STEP 10: Send Email
      - name: Send email with report link
        if: always()
        env:
          MAIL_CONNECTION: ${{ secrets.MAIL_CONNECTION }}
          PAGE_URL:        ${{ steps.deployment.outputs.page_url }}
          REPO:            ${{ github.repository }}
          RUN_ID:          ${{ github.run_id }}
          PROJECT:         ${{ env.PROJECT }}
          ENV_NAME:        ${{ env.ENV_NAME }}
          BROWSER:         ${{ env.BROWSER }}
        run: |
          python3 <<EOF
          import os, smtplib, ssl
          from urllib.parse import urlparse
          from email.message import EmailMessage

          conn = os.getenv("MAIL_CONNECTION")

          if not conn:
              print("MAIL_CONNECTION missing")
              exit(0)

          parsed   = urlparse(conn)
          username = parsed.username
          password = parsed.password
          host     = parsed.hostname
          port     = parsed.port or 587

          page_url = os.getenv("PAGE_URL")
          project  = os.getenv("PROJECT",  "ida")
          env_name = os.getenv("ENV_NAME", "dev")
          browser  = os.getenv("BROWSER",  "chrome")
          repo     = os.getenv("REPO")
          run_id   = os.getenv("RUN_ID")

          msg = EmailMessage()
          msg['Subject'] = f"[{project.upper()} | {env_name.upper()}] Automation Allure Report"
          msg['From']    = username
          msg['To']      = username

          msg.add_alternative(f'''
          <h2>Automation Report Ready</h2>
          <table cellpadding="8" style="border-collapse:collapse;font-family:sans-serif;">
            <tr><td><b>Project</b></td><td>{project.upper()}</td></tr>
            <tr><td><b>Environment</b></td><td>{env_name.upper()}</td></tr>
            <tr><td><b>Browser</b></td><td>{browser}</td></tr>
          </table>
          <br>
          <p>
            <a href="{page_url}" style="padding:10px 20px;background:#4CAF50;color:white;
               text-decoration:none;border-radius:4px;font-weight:bold;">
              VIEW ALLURE REPORT
            </a>
          </p>
          <br>
          <p>
            <a href="https://github.com/{repo}/actions/runs/{run_id}">
              View Workflow Run on GitHub
            </a>
          </p>
          ''', subtype='html')

          context = ssl.create_default_context()
          with smtplib.SMTP(host, port) as server:
              server.starttls(context=context)
              server.login(username, password)
              server.send_message(msg)

          print("EMAIL SENT SUCCESSFULLY")
          EOF
