name: Automation CI Pipeline

on:
  push:
    branches: [ feature/unified-framework-multi-env-support ]

  workflow_dispatch:
    inputs:
      project:
        description: 'Project to test'
        required: true
        default: 'abdm'
        type: choice
        options:
          - ida
          - nas
          - abdm

      environment:
        description: 'Environment to test against'
        required: true
        default: 'testing'
        type: choice
        options:
          - dev
          - pathqa
          - staging
          - demo
          - testing

      browser:
        description: 'Browser'
        required: false
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    env:
      PROJECT:  ${{ github.event.inputs.project || 'ida' }}
      ENV_NAME: ${{ github.event.inputs.environment || 'pathqa' }}
      BROWSER:  ${{ github.event.inputs.browser || 'chrome' }}

    steps:

################################################################################
# STEP 1: Checkout Repository
################################################################################

      - name: Checkout repository
        uses: actions/checkout@v4

################################################################################
# STEP 2: Setup Java
################################################################################

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: '17'

################################################################################
# STEP 3: Cache Maven Dependencies
################################################################################

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}

################################################################################
# STEP 4: Run Automation Tests
################################################################################

      - name: Run Maven tests
        run: |
          echo "Running suite → project: $PROJECT | env: $ENV_NAME | browser: $BROWSER"

          mvn clean test \
            -Dproject=$PROJECT \
            -Denv=$ENV_NAME \
            -Dbrowser=$BROWSER \
            -Dheadless=true

        continue-on-error: true

################################################################################
# STEP 5: Verify Allure Results
################################################################################

      - name: Check allure results
        run: |
          if [ -d allure-results ]; then
            echo "Allure results found"
            ls -la allure-results
          else
            echo "Creating empty allure-results"
            mkdir -p allure-results
          fi

################################################################################
# STEP 6: Install Allure CLI
################################################################################

      - name: Install Allure CLI
        run: |
          curl -Ls -o allure.tgz https://github.com/allure-framework/allure2/releases/download/2.24.1/allure-2.24.1.tgz
          sudo tar -zxvf allure.tgz -C /opt/
          sudo ln -sf /opt/allure-2.24.1/bin/allure /usr/bin/allure
          allure --version

################################################################################
# STEP 7: Generate Timestamp
################################################################################

      - name: Generate timestamp
        id: timestamp
        run: |
          echo "TIME_STAMP=$(date +"%Y-%m-%d_%H-%M-%S")" >> $GITHUB_ENV

################################################################################
# STEP 8: Generate Allure Report
################################################################################

      - name: Generate Allure report
        run: |
          mkdir -p allure-report

          allure generate allure-results --clean -o allure-report \
            --report-name "$PROJECT Automation Report - $ENV_NAME"

          if [ ! -f allure-report/index.html ]; then
            echo "<html><body><h2>No Allure results found</h2></body></html>" \
              > allure-report/index.html
          fi

################################################################################
# STEP 9: Prepare GitHub Pages Structure
################################################################################

      - name: Prepare report folders
        run: |

          mkdir -p github-pages

          # Project wise history folder
          mkdir -p github-pages/reports/$PROJECT/$TIME_STAMP

          # Latest report folder
          mkdir -p github-pages/latest/$PROJECT

          # Copy timestamp report
          cp -r allure-report/* github-pages/reports/$PROJECT/$TIME_STAMP/

          # Update latest report
          rm -rf github-pages/latest/$PROJECT/*
          cp -r allure-report/* github-pages/latest/$PROJECT/

################################################################################
# STEP 10: Create Index Page
################################################################################

      - name: Create index page
        run: |

          cat > github-pages/index.html <<EOF
          <html>
          <head>
              <title>Automation Reports</title>
          </head>
          <body>

          <h1>Automation Allure Reports</h1>

          <h2>Latest Reports</h2>

          <ul>
            <li><a href="./latest/ida/index.html">IDA Latest Report</a></li>
            <li><a href="./latest/nas/index.html">NAS Latest Report</a></li>
            <li><a href="./latest/abdm/index.html">ABDM Latest Report</a></li>
          </ul>

          <h2>Historical Reports</h2>

          <p>
            Navigate to:
          </p>

          <ul>
            <li>/reports/ida/</li>
            <li>/reports/nas/</li>
            <li>/reports/abdm/</li>
          </ul>

          </body>
          </html>
          EOF

################################################################################
# STEP 11: Deploy GitHub Pages
################################################################################

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./github-pages
          keep_files: true

################################################################################
# STEP 12: Workflow Summary
################################################################################

      - name: Add report link to summary
        if: always()
        run: |

          echo "## Automation Execution Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Project | $PROJECT |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | $ENV_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| Browser | $BROWSER |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $TIME_STAMP |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Latest Report" >> $GITHUB_STEP_SUMMARY
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/latest/$PROJECT/index.html" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Historical Report" >> $GITHUB_STEP_SUMMARY
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/$PROJECT/$TIME_STAMP/index.html" >> $GITHUB_STEP_SUMMARY
