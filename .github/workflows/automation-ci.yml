name: Automation CI Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to test'
        required: true
        default: 'abdm'
        type: choice
        options:
          - ida
          - nas
          - abdm
      environment:
        description: 'Environment to test against'
        required: true
        default: 'testing'
        type: choice
        options:
          - dev
          - pathqa
          - staging
          - demo
          - testing
      browser:
        description: 'Browser'
        required: false
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    env:
      PROJECT:  ${{ github.event.inputs.project     || 'ida' }}
      ENV_NAME: ${{ github.event.inputs.environment || 'pathqa' }}
      BROWSER:  ${{ github.event.inputs.browser     || 'chrome' }}

    steps:

      ################################################################################
      # STEP 1: Checkout Repository
      ################################################################################

      - name: Checkout repository
        uses: actions/checkout@v4

      ################################################################################
      # STEP 2: Setup Java
      ################################################################################

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: '17'

      ################################################################################
      # STEP 3: Cache Maven Dependencies
      ################################################################################

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-${{ runner.os }}

      ################################################################################
      # STEP 4: Run Maven Tests
      ################################################################################

      - name: Run Maven tests
        run: |
          echo "Running suite → project: $PROJECT | env: $ENV_NAME | browser: $BROWSER"
          mvn clean test \
            -Dproject=$PROJECT \
            -Denv=$ENV_NAME \
            -Dbrowser=$BROWSER \
            -Dheadless=true
        continue-on-error: true

      ################################################################################
      # STEP 5: Verify Allure Results
      ################################################################################

      - name: Check allure results
        run: |
          if [ -d allure-results ]; then
            echo "Allure results found"
            ls -la allure-results
          else
            echo "Creating empty allure-results"
            mkdir -p allure-results
          fi

      ################################################################################
      # STEP 6: Install Allure CLI
      ################################################################################

      - name: Install Allure CLI
        run: |
          curl -Ls -o allure.tgz https://github.com/allure-framework/allure2/releases/download/2.24.1/allure-2.24.1.tgz
          sudo tar -zxvf allure.tgz -C /opt/
          sudo ln -sf /opt/allure-2.24.1/bin/allure /usr/bin/allure
          allure --version

      ################################################################################
      # STEP 7: Generate Timestamp
      ################################################################################

      - name: Generate timestamp
        run: |
          echo "TIME_STAMP=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

      ################################################################################
      # STEP 8: Generate Allure Report
      ################################################################################

      - name: Generate Allure report
        run: |
          mkdir -p allure-report
          allure generate allure-results --clean -o allure-report \
            --report-name "IDA/NAS Regression — $PROJECT / $ENV_NAME" || true

          if [ ! -f allure-report/index.html ]; then
            echo "Creating fallback report"
            echo "<html><body><h2>No Allure results found for $PROJECT / $ENV_NAME</h2></body></html>" \
              > allure-report/index.html
          fi

      ################################################################################
      # STEP 9: Prepare GitHub Pages Folder Structure
      # Every run gets its own timestamped folder:
      #   reports/{project}/{timestamp}/
      # The latest folder is also updated for quick access:
      #   latest/{project}/
      ################################################################################

      - name: Prepare report folder structure
        run: |
          mkdir -p gh-pages-publish/reports/$PROJECT/$TIME_STAMP
          mkdir -p gh-pages-publish/latest/$PROJECT

          # Copy into timestamped folder (permanent, unique per run)
          cp -r allure-report/* gh-pages-publish/reports/$PROJECT/$TIME_STAMP/

          # Copy into latest folder (overwritten each run for that project)
          cp -r allure-report/* gh-pages-publish/latest/$PROJECT/

      ################################################################################
      # STEP 10: Deploy to GitHub Pages (branch-based, keeps all previous files)
      ################################################################################

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-publish
          keep_files: true     # ← This is the key: previous run folders are never deleted

      ################################################################################
      # STEP 11: Workflow Summary
      ################################################################################

      - name: Add report links to summary
        if: always()
        run: |
          BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

          LATEST_URL="$BASE_URL/latest/$PROJECT/index.html"
          HISTORICAL_URL="$BASE_URL/reports/$PROJECT/$TIME_STAMP/index.html"

          echo "## 🚀 Automation Execution Completed"                >> $GITHUB_STEP_SUMMARY
          echo ""                                                     >> $GITHUB_STEP_SUMMARY
          echo "| Key             | Value           |"               >> $GITHUB_STEP_SUMMARY
          echo "|-----------------|-----------------|"               >> $GITHUB_STEP_SUMMARY
          echo "| **Project**     | \`$PROJECT\`    |"              >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`$ENV_NAME\`   |"              >> $GITHUB_STEP_SUMMARY
          echo "| **Browser**     | \`$BROWSER\`    |"              >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp**   | \`$TIME_STAMP\` |"              >> $GITHUB_STEP_SUMMARY
          echo ""                                                     >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Report Links"                                 >> $GITHUB_STEP_SUMMARY
          echo ""                                                     >> $GITHUB_STEP_SUMMARY
          echo "🔗 **This Run (Permanent):** [$TIME_STAMP Report]($HISTORICAL_URL)"  >> $GITHUB_STEP_SUMMARY
          echo ""                                                     >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Latest $PROJECT Report:** [Open Latest]($LATEST_URL)"           >> $GITHUB_STEP_SUMMARY
          echo ""                                                     >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      ################################################################################
      # STEP 12: Send Email Notification
      ################################################################################

      - name: Send email with report link
        if: always()
        env:
          MAIL_CONNECTION: ${{ secrets.MAIL_CONNECTION }}
          REPO:            ${{ github.repository }}
          RUN_ID:          ${{ github.run_id }}
        run: |
          python3 <<EOF
          import os, smtplib, ssl
          from urllib.parse import urlparse
          from email.message import EmailMessage

          conn = os.getenv("MAIL_CONNECTION")
          if not conn:
              print("MAIL_CONNECTION missing — skipping email")
              exit(0)

          parsed   = urlparse(conn)
          username = parsed.username
          password = parsed.password
          host     = parsed.hostname
          port     = parsed.port or 587

          project   = os.getenv("PROJECT",    "ida")
          env_name  = os.getenv("ENV_NAME",   "dev")
          browser   = os.getenv("BROWSER",    "chrome")
          timestamp = os.getenv("TIME_STAMP", "unknown")
          repo      = os.getenv("REPO")
          run_id    = os.getenv("RUN_ID")

          owner     = repo.split("/")[0]
          repo_name = repo.split("/")[1]
          base_url  = f"https://{owner}.github.io/{repo_name}"

          historical_url = f"{base_url}/reports/{project}/{timestamp}/index.html"
          latest_url     = f"{base_url}/latest/{project}/index.html"

          msg = EmailMessage()
          msg['Subject'] = f"[{project.upper()} | {env_name.upper()}] Automation Report — {timestamp}"
          msg['From']    = username
          msg['To']      = username

          msg.add_alternative(f'''
          <h2>Automation Report Ready</h2>
          <table cellpadding="8" style="border-collapse:collapse;font-family:sans-serif;">
            <tr><td><b>Project</b></td><td>{project.upper()}</td></tr>
            <tr><td><b>Environment</b></td><td>{env_name.upper()}</td></tr>
            <tr><td><b>Browser</b></td><td>{browser}</td></tr>
            <tr><td><b>Timestamp</b></td><td>{timestamp}</td></tr>
          </table>
          <br>
          <p>
            <a href="{historical_url}" style="padding:10px 20px;background:#4CAF50;color:white;
               text-decoration:none;border-radius:4px;font-weight:bold;">
              VIEW THIS RUN&#39;S REPORT
            </a>
          </p>
          <p>
            <a href="{latest_url}" style="padding:10px 20px;background:#2196F3;color:white;
               text-decoration:none;border-radius:4px;font-weight:bold;">
              VIEW LATEST {project.upper()} REPORT
            </a>
          </p>
          <br>
          <p>
            <a href="https://github.com/{repo}/actions/runs/{run_id}">
              View Workflow Run on GitHub
            </a>
          </p>
          ''', subtype='html')

          context = ssl.create_default_context()
          with smtplib.SMTP(host, port) as server:
              server.starttls(context=context)
              server.login(username, password)
              server.send_message(msg)

          print("EMAIL SENT SUCCESSFULLY")
          EOF
