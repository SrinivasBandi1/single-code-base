<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IDA Historical Reports</title>
  <style>
    body { margin:0; padding:0; background:#f4f7fb; font-family:Arial,sans-serif; }
    .header { background:#111827; color:white; padding:24px 30px; }
    .header h1 { margin:0; font-size:24px; }
    .header p  { margin:6px 0 0; color:#9ca3af; font-size:14px; }
    .back { display:inline-block; margin:20px 30px 0; color:#2563eb;
            text-decoration:none; font-size:14px; }
    .back:hover { text-decoration:underline; }
    .container { width:90%; margin:20px auto 60px; }
    table { width:100%; border-collapse:collapse; background:white;
            border-radius:12px; overflow:hidden;
            box-shadow:0 4px 10px rgba(0,0,0,0.08); }
    th { background:#111827; color:white; padding:14px 16px; text-align:left; }
    tr:hover td { background:#f0f4ff; }
  </style>
</head>
<body>
  <div class="header">
    <h1>IDA — Historical Reports</h1>
    <p>All past automation runs for the IDA project</p>
  </div>
  <a class="back" href="https://SrinivasBandi1.github.io/single-code-base/">← Back to Dashboard</a>
  <div class="container">
    <table>
      <tr>
        <th>#</th>
        <th>Run Timestamp</th>
        <th>Report Link</th>
      </tr>
      <tr><td colspan='3' style='padding:20px;text-align:center;color:#6b7280;'>
      No reports found yet.</td></tr>
    </table>
  </div>
</body>
</html>
